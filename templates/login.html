<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Movie Night — Sign in</title>
  {{template "style"}}
</head>
<body>
  <main>
    <header class="topbar">
      <h1>🍿 Movie Night</h1>
      {{template "theme-toggle"}}
    </header>

    {{if .Error}}<div class="error">{{.Error}}</div>{{end}}

    <div class="card">
      <h2>Sign in</h2>
      <form method="post" action="/login">
        <label for="login-username">Username</label>
        <input id="login-username" type="text" name="username" required autofocus>
        <label for="login-password">Password</label>
        <input id="login-password" type="password" name="password" required>
        <button type="submit" class="primary">Sign in</button>
      </form>
    </div>

    <div class="card">
      <h2>New here? Create an account</h2>
      <form method="post" action="/register">
        <label for="reg-username">Username</label>
        <input id="reg-username" type="text" name="username" maxlength="50" required>
        <label for="reg-password">Password <span class="muted">(4+ characters)</span></label>
        <input id="reg-password" type="password" name="password" minlength="4" required>
        <button type="submit">Create account</button>
      </form>
    </div>
  </main>
</body>
</html>
