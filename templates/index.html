<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Movie Night</title>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  {{template "style"}}
</head>
<body>
  <main>
    <header class="topbar">
      <div class="brand">
        <h1>🍿 Movie Night</h1>
        <div class="theater-pill">
          <a class="theater-name" href="/t/{{.TheaterID}}/overview" title="View theater members">{{.TheaterName}}</a>
          <a class="switch-link" href="/theaters">switch</a>
        </div>
      </div>
      <div>
        {{template "theme-toggle"}}
        <span class="muted">hi, {{.Username}}</span>
        <form class="inline" method="post" action="/logout">
          <button type="submit" class="linkish">sign out</button>
        </form>
      </div>
    </header>

    <form class="add-form" hx-post="/t/{{.TheaterID}}/movies" hx-target="#movie-board"
          hx-on::after-request="if (event.detail.successful && event.detail.elt === this) { this.reset(); document.getElementById('search-results').innerHTML = ''; }">
      <input type="text" name="title" id="title-input" placeholder="Search for a movie…"
             maxlength="200" required autocomplete="off"
             hx-get="/t/{{.TheaterID}}/search" hx-trigger="input changed delay:400ms"
             hx-target="#search-results" hx-sync="this:replace">
      <button type="submit" class="primary">Add</button>
    </form>
    <div id="search-results"></div>
    <p class="muted">Pick a search result (or just hit Add). Everyone gets one vote — click again to remove it, or vote elsewhere to move it.</p>

    <div id="movie-board">
      {{template "movie-board" .}}
    </div>
  </main>
  <script>
    (function connect() {
      const proto = location.protocol === "https:" ? "wss:" : "ws:";
      const ws = new WebSocket(proto + "//" + location.host + "/ws");
      ws.onmessage = () => {
        htmx.ajax("GET", "/t/{{.TheaterID}}/board", { target: "#movie-board", swap: "innerHTML" });
      };
      ws.onclose = () => setTimeout(connect, 1000);
    })();
  </script>
</body>
</html>
