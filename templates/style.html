{{define "style"}}
<script>
  (function () {
    if (localStorage.getItem('theme') === 'light') {
      document.documentElement.setAttribute('data-theme', 'light');
    }
  })();
</script>
<link rel="preconnect" href="https://api.fontshare.com">
<link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600&display=swap" rel="stylesheet">
<style>
  :root {
    color-scheme: dark;
    --bg: #0b0d12;
    --surface: #12151c;
    --base900: #f3f4f6;
    --base700: #d1d5db;
    --base500: #9ca3af;
    --base400: #6b7280;
    --base300: #374151;
    --base100: #1a1e27;
    --fg-invert: #0b0d12;
    --prim600: #4c8dff;
    --prim100: #1c2b4d;
    --prim50: #141a29;
    --err600: #f87171;
    --err50: #2a1616;
  }
  :root[data-theme="light"] {
    color-scheme: light;
    --bg: #fff;
    --surface: #fff;
    --base900: #0c111c;
    --base700: #374151;
    --base500: #6b7280;
    --base400: #9ca3af;
    --base300: #d1d5db;
    --base100: #f6f7f8;
    --fg-invert: #fff;
    --prim600: #165ff2;
    --prim100: #e0eeff;
    --prim50: #f2f5fd;
    --err600: #de3024;
    --err50: #fef3f2;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'General Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--base900);
    min-height: 100vh;
    letter-spacing: -0.011em;
    transition: background-color 0.15s ease, color 0.15s ease;
  }
  main { max-width: 44rem; margin: 0 auto; padding: 3rem 1.5rem 4rem; }
  h1 { margin: 0; font-size: 2rem; font-weight: 600; letter-spacing: -0.022em; }
  h2 {
    font-size: 1.375rem; font-weight: 600; letter-spacing: -0.022em;
    color: var(--base900); margin: 3rem 0 0.5rem;
  }
  header.topbar {
    display: flex; justify-content: space-between; align-items: center;
    gap: 1rem; padding-bottom: 1.5rem; margin-bottom: 1.5rem;
    border-bottom: 1px solid var(--base900);
  }
  .muted { color: var(--base500); font-size: 0.9rem; }
  a { color: var(--prim600); }
  form.inline { display: inline; }

  input[type="text"], input[type="password"] {
    background: var(--surface); border: 1.5px solid var(--base300); color: inherit;
    border-radius: 0.5rem; padding: 0.55rem 0.9rem; font-size: 1rem; width: 100%;
    font-family: inherit; letter-spacing: inherit;
  }
  input:focus { outline: none; border-color: var(--prim600); }

  button, a.signin {
    display: inline-flex; justify-content: center; align-items: center; gap: 0.5rem;
    background: transparent; color: var(--base900);
    border: 1.5px solid var(--base900); border-radius: 0.5rem;
    padding: 0.45rem 1.1rem; font-size: 0.95rem; font-weight: 500;
    font-family: inherit; letter-spacing: -0.014em;
    cursor: pointer; text-decoration: none;
    transition: box-shadow 0.15s ease;
  }
  button:hover, a.signin:hover { box-shadow: 0 0 0.5rem 0.25rem #00000014; }
  button:active { box-shadow: none; }
  button.primary, a.signin {
    background: var(--base900); border-color: var(--base900); color: var(--fg-invert);
  }
  button.voted { background: var(--prim600); border-color: var(--prim600); color: #fff; }
  button.linkish {
    background: none; border: none; color: var(--base500);
    padding: 0.25rem; font-size: 0.9rem; font-weight: 400;
  }
  button.linkish:hover { box-shadow: none; color: var(--base900); text-decoration: underline; }

  .add-form { display: flex; gap: 0.75rem; margin-bottom: 0.5rem; }
  .add-form button { flex-shrink: 0; }

  .movie-main { display: flex; align-items: center; gap: 1rem; min-width: 0; }
  img.poster, .poster.placeholder {
    width: 3rem; height: 4.25rem; object-fit: cover; border-radius: 0.5rem;
    flex-shrink: 0; background: var(--base100);
    display: flex; align-items: center; justify-content: center; font-size: 1.25rem;
  }
  ul.search-results {
    list-style: none; padding: 0.5rem; margin: 0.75rem 0 0;
    border: 1.5px solid var(--base900); border-radius: 0.75rem;
    background: var(--surface);
  }
  ul.search-results li {
    display: flex; justify-content: space-between; align-items: center;
    gap: 1rem; padding: 0.5rem;
    border-radius: 0.5rem;
  }
  ul.search-results li:hover { background: var(--prim50); }
  ul.search-results img.poster-thumb, ul.search-results .poster-thumb.placeholder {
    width: 2.25rem; height: 3.25rem; object-fit: cover; border-radius: 0.375rem;
    flex-shrink: 0; background: var(--base100);
    display: flex; align-items: center; justify-content: center; font-size: 1rem;
  }
  ul.search-results .movie-main { gap: 0.75rem; }
  ul.search-results button { padding: 0.3rem 0.8rem; font-size: 0.85rem; white-space: nowrap; }

  ul.movies { list-style: none; padding: 0; margin: 0; }
  ul.movies li {
    display: flex; justify-content: space-between; align-items: center;
    gap: 1.5rem; flex-wrap: wrap;
    padding: 1.25rem 0;
    border-bottom: 1px solid var(--base900);
  }
  ul.movies li strong { font-size: 1.15rem; font-weight: 500; letter-spacing: -0.014em; }
  .actions { display: flex; align-items: center; gap: 0.75rem; }
  .count {
    background: var(--prim100); color: var(--prim600);
    border-radius: 999px; padding: 0.2rem 0.75rem;
    font-size: 0.85rem; font-weight: 500; font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }

  ul.watched { list-style: none; padding: 0; margin: 0; }
  ul.watched li {
    display: flex; justify-content: space-between; gap: 1rem;
    padding: 0.75rem 0; border-bottom: 1px solid var(--base100);
    color: var(--base700);
  }

  .card {
    background: var(--surface); border: 1.5px solid var(--base900); border-radius: 0.75rem;
    padding: 1.75rem; margin-top: 1.5rem;
  }
  .card h2 { margin: 0 0 0.5rem; font-size: 1.25rem; }
  .card label {
    display: block; margin: 1rem 0 0.35rem;
    font-size: 0.9rem; font-weight: 500; color: var(--base700);
  }
  .card button { margin-top: 1.25rem; width: 100%; padding: 0.6rem; }

  .error {
    background: var(--err50); border: 1.5px solid var(--err600); color: var(--err600);
    border-radius: 0.5rem; padding: 0.6rem 0.9rem; margin-top: 1.5rem; font-size: 0.9rem;
  }

  .theme-toggle {
    padding: 0.45rem 0.6rem; font-size: 1rem; line-height: 1;
  }
  .theme-toggle .icon-light { display: none; }
  :root[data-theme="light"] .theme-toggle .icon-dark { display: none; }
  :root[data-theme="light"] .theme-toggle .icon-light { display: inline; }
</style>
{{end}}

{{define "theme-toggle"}}
<button type="button" class="linkish theme-toggle" onclick="toggleTheme()" aria-label="Toggle color theme">
  <span class="icon-dark">☀️</span><span class="icon-light">🌙</span>
</button>
<script>
  function toggleTheme() {
    var root = document.documentElement;
    if (root.getAttribute('data-theme') === 'light') {
      root.removeAttribute('data-theme');
      localStorage.setItem('theme', 'dark');
    } else {
      root.setAttribute('data-theme', 'light');
      localStorage.setItem('theme', 'light');
    }
  }
</script>
{{end}}
