services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: movienight
      POSTGRES_PASSWORD: movienight
      POSTGRES_DB: movienight
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U movienight -d movienight"]
      interval: 2s
      timeout: 3s
      retries: 30

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://movienight:movienight@db:5432/movienight?sslmode=disable
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
